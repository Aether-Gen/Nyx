<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SoundLab</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
  <style>
    body { transition: background 0.4s ease; }
    .button-grid { display:flex; flex-wrap:wrap; gap:0.5rem; }
    button.active { outline: 3px solid black; transform: scale(1.05); }
  </style>
</head>
<body>

<nav class="container-fluid">
  <ul><li><strong>SoundLab</strong></li></ul>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Docs</a></li>
    <li><a href="#" role="button">Start</a></li>
  </ul>
</nav>

<main class="container">
  <div class="grid">
    <section>
      <hgroup>
        <h2>Gerador Sensorial</h2>
        <h3>Vibração dominante + som mínimo</h3>
      </hgroup>

      <p>Experiência focada em sensação física.</p>

      <figure>
        <img src="" alt="" />
        <figcaption><a href="#" target="_blank"></a></figcaption>
      </figure>

      <h3>Vibração (100–150 Hz)</h3>
      <input type="range" min="0" max="100" value="50" id="freqSlider" />
      <button id="toggleSub">Ativar Vibração</button>

      <h3>Notas (quase imperceptíveis)</h3>
      <div class="button-grid">
        <button id="c5" onclick="toggleNote('c5')">C5</button>
        <button id="e5" onclick="toggleNote('e5')">E5</button>
        <button id="g5" onclick="toggleNote('g5')">G5</button>
      </div>

      <h3>Cores</h3>
      <div class="button-grid">
        <button onclick="toggleColor(this,'red')" style="background:red"></button>
        <button onclick="toggleColor(this,'orange')" style="background:orange"></button>
        <button onclick="toggleColor(this,'yellow')" style="background:yellow"></button>
        <button onclick="toggleColor(this,'green')" style="background:green"></button>
        <button onclick="toggleColor(this,'blue')" style="background:blue"></button>
        <button onclick="toggleColor(this,'indigo')" style="background:indigo"></button>
        <button onclick="toggleColor(this,'violet')" style="background:violet"></button>
      </div>

    </section>
  </div>
</main>

<section aria-label="Subscribe example">
  <div class="container">
    <article>
      <hgroup>
        <h2>Feedback</h2>
        <h3>Opcional</h3>
      </hgroup>
      <form class="grid">
        <input type="text" placeholder="Nome" required />
        <input type="email" placeholder="Email" required />
        <button type="submit" onclick="event.preventDefault()">Enviar</button>
      </form>
    </article>
  </div>
</section>

<footer class="container">
  <small><a href="#">Contato</a> • <a href="#">GitHub</a></small>
</footer>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let baseOsc = null;
let baseGain = audioCtx.createGain();
baseGain.gain.value = 1.0;
baseGain.connect(audioCtx.destination);

let subActive = false;

function startBaseOsc(freq) {
  if (baseOsc) baseOsc.stop();
  baseOsc = audioCtx.createOscillator();
  baseOsc.type = 'sine';
  baseOsc.frequency.value = freq;
  baseOsc.connect(baseGain);
  baseOsc.start();
}

function stopBaseOsc() {
  if (baseOsc) {
    baseOsc.stop();
    baseOsc = null;
  }
}

const slider = document.getElementById('freqSlider');
slider.addEventListener('input', () => {
  if (!subActive) return;
  const freq = 100 + (slider.value / 100) * 50;
  startBaseOsc(freq);
});

document.getElementById('toggleSub').onclick = () => {
  subActive = !subActive;
  if (subActive) {
    const freq = 100 + (slider.value / 100) * 50;
    startBaseOsc(freq);
  } else {
    stopBaseOsc();
  }
};

const noteFreqs = {
  c5:523.2511,
  e5:659.2551,
  g5:783.9909
};

const noteGains = {
  c5:0.025,
  e5:0.02,
  g5:0.015
};

let activeNotes = {};

function toggleNote(note) {
  const btn = document.getElementById(note);

  if (activeNotes[note]) {
    activeNotes[note].osc.stop();
    delete activeNotes[note];
    btn.classList.remove('active');
  } else {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.setValueAtTime(noteFreqs[note], audioCtx.currentTime);

    gain.gain.value = noteGains[note];

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();

    activeNotes[note] = { osc };
    btn.classList.add('active');
  }
}

let activeColors = [];

function updateBackground() {
  if (activeColors.length === 0) {
    document.body.style.background = '';
  } else if (activeColors.length === 1) {
    document.body.style.background = activeColors[0];
  } else {
    const c1 = activeColors[0];
    const c2 = activeColors[1];

    document.body.style.background = `linear-gradient(to right,
      ${c1} 0%,
      ${c1} 35%,
      ${c2} 65%,
      ${c2} 100%
    )`;
  }
}

function toggleColor(el,color) {
  const index = activeColors.indexOf(color);

  if (index > -1) {
    activeColors.splice(index,1);
    el.classList.remove('active');
  } else {
    if (activeColors.length >= 2) {
      const removed = activeColors.shift();
      document.querySelectorAll('.button-grid button').forEach(b=>{
        if (b.style.background === removed) b.classList.remove('active');
      });
    }
    activeColors.push(color);
    el.classList.add('active');
  }

  updateBackground();
}
</script>

</body>
</html>
